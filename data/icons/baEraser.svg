<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <rect width="64" height="64" rx="12" fill="#1c1c1c"/>
  <!-- Photo frame -->
  <rect x="8" y="10" width="48" height="36" rx="3" fill="#2d2d2d" stroke="#555" stroke-width="1.5"/>
  <!-- Image content suggestion -->
  <rect x="11" y="13" width="42" height="30" rx="2" fill="#3a3a3a"/>
  <!-- Eraser tool -->
  <rect x="30" y="38" width="26" height="11" rx="3" fill="#e07020" transform="rotate(-35 43 44)"/>
  <rect x="30" y="38" width="8"  height="11" rx="2" fill="#f0f0e0" transform="rotate(-35 43 44)"/>
  <!-- Erased area (white smudge) -->
  <ellipse cx="22" cy="28" rx="9" ry="7" fill="#f5f5f5" opacity="0.85"/>
</svg>
